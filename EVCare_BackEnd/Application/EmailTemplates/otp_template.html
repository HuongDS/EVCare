<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Mã OTP EVCare</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f7f7f7; padding: 40px;">

    <div style="background: white; max-width: 520px; margin: auto; padding: 30px; text-align: center;
                border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.1);">

        <img src="https://res.cloudinary.com/ddojmkykj/image/upload/v1762996254/Logo/logo_dmxluq.png"
             style="width: 180px; margin-bottom: 25px;" />

        <h2 style="color: #2d2d2d; font-size: 22px; font-weight: 700;">
            Your verification code:
        </h2>

        <p style="font-size: 32px; font-weight: bold; letter-spacing: 3px; color: #4CAF50;">
            {{OTP_CODE}}
        </p>

        <p style="margin-top: 25px; font-size: 15px; color: #555;">
            This code will expire in <b>{{EXPIRES_MINUTES}}</b> minutes.
        </p>
    </div>

</body>
</html>
