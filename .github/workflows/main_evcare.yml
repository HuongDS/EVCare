name: Build and Deploy ASP.NET Core to Azure Web App - EVCare

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ./EVCare_BackEnd/API/API.csproj

    - name: Build project
      run: dotnet build ./EVCare_BackEnd/API/API.csproj --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish ./EVCare_BackEnd/API/API.csproj -c Release -o ./publish

    # 🔹 Đổi chỗ FTP Deploy thành Azure Deploy
    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E114DBF0427E4E18A1D1953126ADE519 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8901E2F8FDC14A7EA15E17029C94E8B2 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BA6DAE37E94B43159065C68CF7D94574 }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'EVCare'
        slot-name: 'Production'
        package: ./publish
