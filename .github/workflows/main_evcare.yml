name: Build and deploy ASP.Net Core app to Azure Web App - EVCare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore EVCare_BackEnd/EVCare_BackEnd.sln

      # Build solution
      - name: Build with dotnet
        run: dotnet build EVCare_BackEnd/EVCare_BackEnd.sln --configuration Release --no-restore

      # Publish project
      - name: dotnet publish
        run: dotnet publish EVCare_BackEnd/API/API.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp --no-build

      # Upload artifact
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E114DBF0427E4E18A1D1953126ADE519 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8901E2F8FDC14A7EA15E17029C94E8B2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BA6DAE37E94B43159065C68CF7D94574 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'EVCare'
          slot-name: 'Production'
          package: .


